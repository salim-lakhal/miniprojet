name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [code/phase2, code/phase3-4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: cd ${{ matrix.app }} && npm install
      - run: cd ${{ matrix.app }} && npx --yes eslint app.js --no-eslintrc --rule '{"no-unused-vars":"warn","no-undef":"error"}' || true

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck scripts/*.sh || true
